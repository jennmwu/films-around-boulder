<!DOCTYPE html>
<html><head><title>Favicon Options</title>
<style>
body { background: #222; color: #fff; font-family: sans-serif; display: flex; gap: 60px; justify-content: center; padding: 60px; }
.option { text-align: center; }
.option h2 { margin-bottom: 20px; color: #FFA400; }
.sizes { display: flex; gap: 20px; align-items: end; }
.size { text-align: center; }
.size img { border: 1px solid #444; }
.size p { font-size: 11px; color: #888; margin-top: 4px; }
</style>
</head><body>
<div class="option">
  <h2>Option A: FAB</h2>
  <div class="sizes">
    <div class="size"><img src="favicon-fab.png" width="16" height="16"><p>16px (tab)</p></div>
    <div class="size"><img src="favicon-fab.png" width="32" height="32"><p>32px</p></div>
    <div class="size"><img src="favicon-fab.png" width="64" height="64"><p>64px</p></div>
    <div class="size"><img src="favicon-fab.png" width="128" height="128"><p>128px</p></div>
  </div>
</div>
<div class="option">
  <h2>Option B: ! (outline)</h2>
  <div class="sizes">
    <div class="size"><img src="favicon-bang.png" width="16" height="16"><p>16px (tab)</p></div>
    <div class="size"><img src="favicon-bang.png" width="32" height="32"><p>32px</p></div>
    <div class="size"><img src="favicon-bang.png" width="64" height="64"><p>64px</p></div>
    <div class="size"><img src="favicon-bang.png" width="128" height="128"><p>128px</p></div>
  </div>
</div>
</body></html>
